name: Build OpenWRT RE650 Image

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      TARGET_CFLAGS: "-Os -fomit-frame-pointer"
      TARGET_LDFLAGS: "-Wl,--gc-sections -Wl,-O3 -Wl,-z,now -Wl,-z,relro"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev zlib1g-dev gawk git gettext libssl-dev xsltproc rsync wget unzip python3 python3-dev jq

      - name: Clean and prepare feeds
        run: |
          make -j$(nproc) distclean
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure and build
        run: |
          echo "ARTIFACT_NAME=${GITHUB_REF_NAME//\//-}" >> "$GITHUB_ENV"
          cp diffconfig-re650 .config
          make -j$(nproc) defconfig download clean world V=s

      - name: Image information
        run: |
          find build_dir/target-mipsel_24kc_musl/linux-ramips_mt7621 -type f \( -name "*.bin" -o -name "*.itb" -o -name "*.squashfs" -o -name "vmlinux" \) -exec du -h {} + | sort -h
          [ -f bin/targets/ramips/mt7621/profiles.json ] && jq . bin/targets/ramips/mt7621/profiles.json

      - name: Verify build artifacts
        run: |
          test -f bin/targets/ramips/mt7621/openwrt-ramips-mt7621-tplink_re650-v2-squashfs-factory.bin
          test -f bin/targets/ramips/mt7621/openwrt-ramips-mt7621-tplink_re650-v2-squashfs-sysupgrade.bin
          test -f bin/targets/ramips/mt7621/config.buildinfo
          test -f bin/targets/ramips/mt7621/version.buildinfo

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-${{ env.ARTIFACT_NAME }}
          path: |
            bin/targets/ramips/mt7621/openwrt-ramips-mt7621-tplink_re650-v2-squashfs-factory.bin
            bin/targets/ramips/mt7621/openwrt-ramips-mt7621-tplink_re650-v2-squashfs-sysupgrade.bin
            bin/targets/ramips/mt7621/config.buildinfo
            bin/targets/ramips/mt7621/version.buildinfo
          retention-days: 90
          if-no-files-found: error
          compression-level: 9
